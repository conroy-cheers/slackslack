<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Emoji Billboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0c121c; }
  canvas { width: 100%; height: 100%; display: block; }
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #50b4ff; font-family: monospace; font-size: 18px;
  }
</style>
</head>
<body>
<div id="loading">Initializing WebGPU...</div>
<canvas id="emoji-canvas"></canvas>
<script type="module">
const BUILD_TAG = '2026-04-23c';
const wasmModule = await import(`./pkg/emoji_web.js?v=${BUILD_TAG}`);
const {
  default: init,
  set_perf_toggles,
  set_render_config,
  set_transfer_tuning,
} = wasmModule;
await init(`./pkg/emoji_web_bg.wasm?v=${BUILD_TAG}`);
document.getElementById('loading')?.remove();

window.__emojiPerfControls = {
  setToggles({ crt = true, transfer = true, overlayFilter = true, billboard = true } = {}) {
    set_perf_toggles(crt, transfer, overlayFilter, billboard);
  },
  setRenderConfig({
    galleryCanvasScale = 1.0,
    previewCanvasScale = 1.0,
    previewMaxDim = 320,
    previewRenderScale = 2.0,
    displayPixelated = false,
    overlayFilter = false,
  } = {}) {
    set_render_config(
      galleryCanvasScale,
      previewCanvasScale,
      previewMaxDim,
      previewRenderScale,
      displayPixelated,
      overlayFilter,
    );
  },
  setTransfer({
    linearGain = 1.15,
    gamma = 1.0,
    lift = -0.05,
    saturation = 1.25,
  } = {}) {
    set_transfer_tuning(linearGain, gamma, lift, saturation);
  },
};
</script>
</body>
</html>
